# Redirect www → non-www (canonical domain)
server {
    listen       8080;
    server_name  www.cloudhealthoffice.com;
    return 301   https://cloudhealthoffice.com$request_uri;
}

server {
    listen       8080;
    server_name  cloudhealthoffice.com;

    root   /usr/share/nginx/html;
    index  index.html;

    # Serve sitemap and other XML files
    location ~* \.xml$ {
        expires 1d;
        try_files $uri =404;
    }


    # Security headers — defined once at server level; location blocks below use
    # expires (not add_header) for cache control so these headers are always inherited.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;


    # Static assets — 1-day cache (assets are not filename-fingerprinted)
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1d;
        try_files $uri =404;
    }

    # Serve homepage directly — avoids index-directive → /index.html → redirect loop
    location = / {
        try_files /index.html =404;
    }

    # Redirect /index.html → / (canonical homepage, external requests only)
    location = /index.html {
        return 301 https://$http_host/;
    }

    # Redirect .html URLs → clean extensionless URLs (301 for SEO)
    # Use $http_host (the request Host header) so the redirect never includes :8080
    location ~* ^/(.+)\.html$ {
        return 301 https://$http_host/$1;
    }

    # Clean URLs: try exact file, then .html extension, then 404
    location / {
        try_files $uri $uri/ $uri.html =404;
    }
}

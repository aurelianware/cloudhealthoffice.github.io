<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500">
  <defs>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ffff"/>
      <stop offset="100%" stop-color="#00ff88"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="500" fill="#000000"/>

  <!-- Title -->
  <text x="600" y="40" font-family="Segoe UI, system-ui, sans-serif" font-size="26" font-weight="900"
        fill="#ffffff" text-anchor="middle">API Reference</text>
  <text x="600" y="65" font-family="Segoe UI, system-ui, sans-serif" font-size="14" fill="#00ffff"
        text-anchor="middle" opacity="0.8">7 Production FHIR R4 APIs &#x2022; OpenAPI 3.1 &#x2022; OAuth 2.0 &#x2022; CMS-0057-F Compliant</text>

  <!-- Central hub -->
  <g transform="translate(600, 260)">
    <circle cx="0" cy="0" r="55" fill="rgba(0,255,255,0.06)" stroke="#00ffff" stroke-width="2" filter="url(#glow)"/>
    <text x="0" y="-10" font-family="Segoe UI, system-ui, sans-serif" font-size="13" font-weight="700"
          fill="#ffffff" text-anchor="middle">FHIR R4</text>
    <text x="0" y="8" font-family="Segoe UI, system-ui, sans-serif" font-size="10" fill="#00ffff" text-anchor="middle">Gateway</text>
    <text x="0" y="24" font-family="Segoe UI, system-ui, sans-serif" font-size="9" fill="#b0b0b0" text-anchor="middle">OAuth 2.0</text>
  </g>

  <!-- Patient Access (top left) -->
  <g transform="translate(200, 150)">
    <rect x="-90" y="-30" width="180" height="60" rx="8" fill="rgba(0,255,255,0.08)" stroke="#00ffff" stroke-width="1.5"/>
    <text x="0" y="-5" font-family="Segoe UI, system-ui, sans-serif" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">Patient Access</text>
    <text x="0" y="12" font-family="Segoe UI, system-ui, sans-serif" font-size="9" fill="#b0b0b0" text-anchor="middle">Patient, Claim, EOB, Coverage</text>
    <circle cx="70" cy="-18" r="8" fill="#00ff88" opacity="0.9"/>
    <path d="M66 -18 L68.5 -15.5 L74 -21" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <line x1="295" y1="160" x2="548" y2="240" stroke="#00ffff" stroke-width="1" opacity="0.3"/>

  <!-- Provider Access (top right) -->
  <g transform="translate(1000, 150)">
    <rect x="-90" y="-30" width="180" height="60" rx="8" fill="rgba(0,255,255,0.08)" stroke="#00ffff" stroke-width="1.5"/>
    <text x="0" y="-5" font-family="Segoe UI, system-ui, sans-serif" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">Provider Access</text>
    <text x="0" y="12" font-family="Segoe UI, system-ui, sans-serif" font-size="9" fill="#b0b0b0" text-anchor="middle">Da Vinci PDex</text>
    <circle cx="70" cy="-18" r="8" fill="#00ff88" opacity="0.9"/>
    <path d="M66 -18 L68.5 -15.5 L74 -21" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <line x1="905" y1="160" x2="652" y2="240" stroke="#00ffff" stroke-width="1" opacity="0.3"/>

  <!-- Prior Auth (left) -->
  <g transform="translate(200, 280)">
    <rect x="-90" y="-30" width="180" height="60" rx="8" fill="rgba(0,255,136,0.08)" stroke="#00ff88" stroke-width="1.5"/>
    <text x="0" y="-5" font-family="Segoe UI, system-ui, sans-serif" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">Prior Authorization</text>
    <text x="0" y="12" font-family="Segoe UI, system-ui, sans-serif" font-size="9" fill="#b0b0b0" text-anchor="middle">PAS + CDS Hooks + X12 278</text>
    <circle cx="70" cy="-18" r="8" fill="#00ff88" opacity="0.9"/>
    <path d="M66 -18 L68.5 -15.5 L74 -21" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <line x1="295" y1="275" x2="545" y2="260" stroke="#00ff88" stroke-width="1" opacity="0.3"/>

  <!-- Payer-to-Payer (right) -->
  <g transform="translate(1000, 280)">
    <rect x="-90" y="-30" width="180" height="60" rx="8" fill="rgba(0,255,136,0.08)" stroke="#00ff88" stroke-width="1.5"/>
    <text x="0" y="-5" font-family="Segoe UI, system-ui, sans-serif" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">Payer-to-Payer</text>
    <text x="0" y="12" font-family="Segoe UI, system-ui, sans-serif" font-size="9" fill="#b0b0b0" text-anchor="middle">Bulk FHIR $export</text>
    <circle cx="70" cy="-18" r="8" fill="#00ff88" opacity="0.9"/>
    <path d="M66 -18 L68.5 -15.5 L74 -21" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <line x1="905" y1="275" x2="655" y2="260" stroke="#00ff88" stroke-width="1" opacity="0.3"/>

  <!-- Claims Scrubbing (bottom left) -->
  <g transform="translate(280, 400)">
    <rect x="-90" y="-25" width="180" height="50" rx="8" fill="rgba(0,255,255,0.06)" stroke="rgba(0,255,255,0.4)" stroke-width="1"/>
    <text x="0" y="-2" font-family="Segoe UI, system-ui, sans-serif" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">Claims Scrubbing</text>
    <text x="0" y="14" font-family="Segoe UI, system-ui, sans-serif" font-size="9" fill="#b0b0b0" text-anchor="middle">NCCI / MUE / Scrub Rules</text>
  </g>
  <line x1="370" y1="380" x2="575" y2="290" stroke="#00ffff" stroke-width="1" opacity="0.2"/>

  <!-- Risk Adjustment (bottom center) -->
  <g transform="translate(600, 400)">
    <rect x="-90" y="-25" width="180" height="50" rx="8" fill="rgba(0,255,255,0.06)" stroke="rgba(0,255,255,0.4)" stroke-width="1"/>
    <text x="0" y="-2" font-family="Segoe UI, system-ui, sans-serif" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">Risk Adjustment</text>
    <text x="0" y="14" font-family="Segoe UI, system-ui, sans-serif" font-size="9" fill="#b0b0b0" text-anchor="middle">HCC / RAF Score</text>
  </g>
  <line x1="600" y1="375" x2="600" y2="315" stroke="#00ffff" stroke-width="1" opacity="0.2"/>

  <!-- Encounter (bottom right) -->
  <g transform="translate(920, 400)">
    <rect x="-90" y="-25" width="180" height="50" rx="8" fill="rgba(0,255,255,0.06)" stroke="rgba(0,255,255,0.4)" stroke-width="1"/>
    <text x="0" y="-2" font-family="Segoe UI, system-ui, sans-serif" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">Encounter Service</text>
    <text x="0" y="14" font-family="Segoe UI, system-ui, sans-serif" font-size="9" fill="#b0b0b0" text-anchor="middle">State / Federal Encounters</text>
  </g>
  <line x1="835" y1="380" x2="625" y2="290" stroke="#00ffff" stroke-width="1" opacity="0.2"/>

  <!-- Bottom bar -->
  <g transform="translate(0, 465)">
    <rect x="0" y="0" width="1200" height="35" fill="rgba(0,255,255,0.03)"/>
    <text x="600" y="22" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="rgba(176,176,176,0.5)"
          text-anchor="middle">Base URL: https://api.cloudhealthoffice.com/fhir/r4 &#x2022; Sandbox: https://sandbox.cloudhealthoffice.com &#x2022; OpenAPI 3.1 Specs Available</text>
  </g>
</svg>

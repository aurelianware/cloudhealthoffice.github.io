<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="chrome" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a0a0ff"/>
      <stop offset="50%" stop-color="#c0ffff"/>
      <stop offset="100%" stop-color="#a0a0ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Monolith shield -->
  <path d="M100 50 L300 50 L350 100 L350 300 L300 350 L100 350 L50 300 L50 100 Z" fill="#0f0f0f" stroke="url(#chrome)" stroke-width="3" filter="url(#glow)"/>

  <!-- Digital eye (the Sentinel) -->
  <circle cx="200" cy="175" r="60" fill="none" stroke="#ffffff" stroke-width="8" filter="url(#glow)"/>
  <circle cx="200" cy="175" r="38" fill="none" stroke="#00ffff" stroke-width="5" opacity="0.8"/>
  <circle cx="200" cy="175" r="18" fill="#0088ff"/>

  <!-- Circuit veins emanating from the eye -->
  <g stroke="#00ffff" stroke-width="1.5" opacity="0.6">
    <path d="M200 115 Q170 65, 140 80" fill="none"/>
    <path d="M200 115 Q230 65, 260 80" fill="none"/>
    <path d="M200 235 Q145 290, 110 310" fill="none"/>
    <path d="M200 235 Q255 290, 290 310" fill="none"/>
    <path d="M140 175 Q80 155, 65 190" fill="none"/>
    <path d="M260 175 Q320 155, 335 190" fill="none"/>
  </g>

  <!-- Subtle lock icon -->
  <rect x="188" y="270" width="24" height="28" rx="2" fill="none" stroke="#ffffff" stroke-width="2.5" opacity="0.5"/>
  <path d="M194 270 V258 Q194 248 200 248 Q206 248 206 258 V270" fill="none" stroke="#ffffff" stroke-width="2.5" opacity="0.5"/>
  <circle cx="200" cy="284" r="3" fill="#ffffff" opacity="0.5"/>
</svg>
